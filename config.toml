baseURL                       = "https://guardianhubx.com/blog/"
languageCode                  = "es-es"
defaultContentLanguage        = "es"
defaultContentLanguageInSubdir = false
relativeURLs                  = false
canonifyURLs                  = true
title                         = "GuardianHubX Blog"
theme                         = "PaperMod"
publishDir                    = "public"
uglyURLs                      = false

[pagination]
  pagerSize = 10

[languages]

  [languages.es]
    languageName = "Español"
    weight       = 1
    contentDir   = "content/es"
    title        = "GuardianHubX Blog"
    
    [languages.es.params]
      mainSections = ["blog"]
      description  = "Blog de ciberseguridad de GuardianHubX: consejos, guías y análisis para proteger tu empresa de ciberamenazas."
      keywords     = ["ciberseguridad", "protección empresas", "ransomware", "malware", "phishing", "seguridad informática", "PYMES"]
      author       = "GuardianHubX"
    
    [languages.es.permalinks]
      blog = "/blog/:slug/"

  [languages.ca]
    languageName = "Català"
    weight       = 2
    contentDir   = "content/ca"
    title        = "GuardianHubX Blog – en català"
    
    [languages.ca.params]
      mainSections = ["blog"]
      description  = "Blog de ciberseguretat de GuardianHubX: consells, guies i anàlisis per protegir la teva empresa de ciberamenaces."
      keywords     = ["ciberseguretat", "protecció empreses", "ransomware", "malware", "phishing", "seguretat informàtica", "PIMES"]
      author       = "GuardianHubX"
    
    [languages.ca.permalinks]
      blog = "/blog/ca/:slug/"

[params]
  env                = "production"
  defaultTheme       = "light"
  showReadingTime    = true
  disableThemeToggle = true
  mainSections       = ["blog"]
  description        = "Blog de ciberseguridad de GuardianHubX: consejos, guías y análisis para proteger tu empresa de ciberamenazas."
  keywords           = ["ciberseguridad", "protección empresas", "ransomware", "malware", "phishing", "seguridad informática", "PYMES"]
  author             = "GuardianHubX"

[params.schema]
  publisherType = "Organization"
  sameAs = [
    "https://www.linkedin.com/company/qualiteasyeu",
    "https://www.tiktok.com/@GuardianHubX",
    "https://www.youtube.com/@GuardianHubX",
    "https://www.instagram.com/guardianhubx"
  ]

[params.assets]
  disableFingerprinting = true
  favicon               = "/favicon.ico"
  customCSS             = ["css/custom.css"]
  customJS              = []
  googleFonts           = ["Poppins"]

[outputs]
  home    = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]